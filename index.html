<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка безопасности</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .cf-wrapper {
            text-align: center;
            max-width: 400px;
            padding: 40px;
            background: #0a0f1a;
            border: 1px solid #1e3a5f;
            border-radius: 40px;
            box-shadow: 0 0 50px #1e4f7f40;
        }
        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #b0e0ff;
        }
        p {
            color: #8bb4e0;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .cf-button {
            background: transparent;
            border: 2px solid #3a7bd5;
            color: white;
            padding: 15px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px #3a7bd5;
        }
        .cf-button:hover {
            background: #3a7bd5;
            transform: scale(1.05);
            box-shadow: 0 0 30px #5a9eff;
        }
        .footer {
            margin-top: 30px;
            font-size: 10px;
            color: #2f5580;
        }
    </style>
</head>
<body>
    <div class="cf-wrapper">
        <h2>🌩️ Проверка Cloudflare</h2>
        <p>Нажмите кнопку, чтобы подтвердить, что вы не робот</p>
        <button class="cf-button" id="verifyButton">✓ Я не робот</button>
        <div class="footer">Protected by Cloudflare</div>
    </div>
    <script>
        document.getElementById('verifyButton').addEventListener('click', () => {
            // Устанавливаем флаг, что проверка пройдена
            localStorage.setItem('cf_verified', 'true');
            // Переходим на главную страницу
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
